<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Global Social Dashboard · WorldFirst</title>
<style>
:root { --ink-0:#111; --ink-1:#444; --ink-2:#777; --ink-3:#aaa; --line:#e7e7e7; --bg:#fff; --bg-2:#fafafa; }
* { box-sizing: border-box; }
body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; color: var(--ink-0); background: var(--bg); margin: 0; padding: 48px 32px 80px; max-width: 1280px; margin-left: auto; margin-right: auto; }
body.locked #content { filter: blur(20px); pointer-events: none; }
h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 6px; }
.tagline { color: var(--ink-2); font-size: 14px; margin-bottom: 8px; }
.meta { color: var(--ink-2); font-size: 13px; margin-bottom: 24px; }
.meta b { color: var(--ink-1); font-weight: 500; }
h2 { font-size: 16px; font-weight: 600; margin: 40px 0 12px; letter-spacing: -0.005em; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); }
th { font-weight: 500; color: var(--ink-1); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; }
tr.total-row { border-top: 2px solid var(--ink-0); background: var(--bg-2); }
tr.total-row td { font-weight: 600; }
tr.recent { background: #fcfcfc; }
.month-cell { font-weight: 500; }
.er-cell { color: var(--ink-1); }
.definition { margin-top: 32px; border: 1px solid var(--line); border-radius: 6px; font-size: 12.5px; color: var(--ink-1); line-height: 1.7; }
.definition > summary { cursor: pointer; padding: 12px 20px; font-weight: 600; color: var(--ink-0); list-style: none; display: flex; justify-content: space-between; align-items: center; }
.definition > summary::-webkit-details-marker { display: none; }
.definition[open] > summary { border-bottom: 1px solid var(--line); }
.definition[open] .def-chev { transform: rotate(180deg); }
.def-chev { transition: transform 0.15s; color: var(--ink-2); font-size: 11px; }
.def-body { padding: 14px 20px 16px; }
.definition b { color: var(--ink-0); font-weight: 600; }
.definition code { font: 11.5px ui-monospace, monospace; background: var(--bg-2); padding: 1px 6px; border-radius: 3px; }
.filter-note { display: inline-block; padding: 6px 12px; background: var(--bg-2); border-radius: 4px; font-size: 12px; color: var(--ink-1); margin-bottom: 24px; }
hr { border: 0; border-top: 1px solid var(--line); margin: 32px 0 0; }

.page-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 16px; }
.shortcut { color: var(--ink-1); font-size: 13px; padding: 8px 14px; border: 1px solid var(--line); border-radius: 5px; text-decoration: none; white-space: nowrap; transition: border-color 0.15s; }
.shortcut:hover { border-color: var(--ink-0); color: var(--ink-0); }

.chart-wrap { margin: 28px 0 8px; }
.line-chart { display: block; width: 100%; height: auto; }
.legend { display: flex; gap: 24px; margin-top: 12px; padding-left: 60px; font-size: 12px; color: var(--ink-1); }
.legend-item { display: inline-flex; align-items: center; gap: 8px; }
.swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }

.hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 32px 0 16px; }
.hero-card { padding: 20px 22px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); }
.hero-num { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink-0); font-variant-numeric: tabular-nums; line-height: 1.1; }
.hero-pct { font-size: 16px; color: var(--ink-2); font-weight: 500; }
.hero-label { font-size: 12px; color: var(--ink-1); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.hero-sub { font-size: 12px; color: var(--ink-2); margin-top: 4px; }

#gate { position: fixed; inset: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
#gate-card { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 32px 36px; max-width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
#gate-card h2 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em; }
#gate-card .gate-sub { color: var(--ink-2); font-size: 13px; margin-bottom: 20px; }
#gate-form { display: flex; gap: 8px; }
#gate-input { flex: 1; padding: 9px 12px; border: 1px solid var(--line); border-radius: 5px; font-size: 14px; font-family: inherit; }
#gate-input:focus { outline: none; border-color: var(--ink-0); }
#gate-btn { padding: 9px 16px; background: var(--ink-0); color: var(--bg); border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; }
#gate-btn:hover { opacity: 0.85; }
#gate-err { color: #c00; font-size: 12px; min-height: 16px; margin-top: 10px; }

.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin: 0 0 20px; }
.tab-btn { appearance: none; background: transparent; border: 0; border-bottom: 2px solid transparent; color: var(--ink-2); font-family: inherit; font-size: 14px; font-weight: 500; padding: 12px 18px; cursor: pointer; margin-bottom: -1px; transition: color 0.1s, border-color 0.1s; text-decoration: none; display: inline-block; }
.tab-btn:hover { color: var(--ink-0); }
.tab-btn.active { color: var(--ink-0); border-bottom-color: var(--ink-0); font-weight: 600; }
.tab-link { margin-left: auto; }
.tabs { align-items: stretch; }

.viral-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 12px; }
.viral-card { display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--bg); text-decoration: none; color: inherit; transition: border-color 0.1s; }
.viral-card:hover { border-color: var(--ink-0); }
.viral-thumb { aspect-ratio: 9/16; background: var(--bg-2); overflow: hidden; }
.viral-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.viral-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--ink-3); font-size: 24px; }
.viral-meta { padding: 12px 14px; }
.viral-kol { font-size: 12px; color: var(--ink-2); margin-bottom: 6px; font-weight: 500; }
.viral-title { font-size: 13px; color: var(--ink-0); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.viral-stats { font-size: 11px; color: var(--ink-2); font-family: 'JetBrains Mono', ui-monospace, monospace; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
</style>

<script>
function b64ToBytes(b64) { const bin = atob(b64); const bytes = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i); return bytes; }
async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
}
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt); const iv = b64ToBytes(blob.iv); const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input'); const err = document.getElementById('gate-err'); err.textContent = '';
  try {
    const innerHtml = await decryptPayload(inp.value);
    document.getElementById('content').innerHTML = innerHtml;
    document.getElementById('content').hidden = false;
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
    try { localStorage.setItem('monthly_pw', inp.value); } catch (_) {}
  } catch (ex) { err.textContent = 'wrong password'; inp.value = ''; inp.focus(); }
  return false;
}
(async () => {
  try {
    const cached = localStorage.getItem('monthly_pw');
    if (cached) {
      const innerHtml = await decryptPayload(cached);
      document.getElementById('content').innerHTML = innerHtml;
      document.getElementById('content').hidden = false;
      document.getElementById('gate').style.display = 'none';
      document.body.classList.remove('locked');
    }
  } catch (_) { try { localStorage.removeItem('monthly_pw'); } catch (_) {} }
})();
function switchTab(btn) {
  const target = btn.getAttribute('data-target');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === target));
  try { localStorage.setItem('monthly_tab', target); } catch (_) {}
}
// Restore last-selected tab after decrypt
const restoreTab = () => { try { const t = localStorage.getItem('monthly_tab'); if (t) { const b = document.querySelector(`.tab-btn[data-target="${t}"]`); if (b) switchTab(b); } } catch (_) {} };
// Hook into existing decrypt flow — run after content fills
const _origGate = gateSubmit;
gateSubmit = async function(e) { const r = await _origGate(e); setTimeout(restoreTab, 50); return r; };
setTimeout(restoreTab, 200);  // also handle the autologin path
</script>
